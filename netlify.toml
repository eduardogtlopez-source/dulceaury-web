# Configuración de Netlify para el sitio público de Dulce Aury.
# Sitio estático: no hay paso de build, solo se publica la carpeta raíz del repo.
[build]
  publish = "."
  command = ""

# Cabeceras de caché: rápido en visitas repetidas, pero permite ver
# imágenes actualizadas dentro de ~1 día (sin quedar pegadas para siempre).
# Para forzar un cambio al instante, súbelo con un ?v=N nuevo en el HTML.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"
