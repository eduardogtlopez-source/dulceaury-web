# Configuración de Netlify para el sitio público de Dulce Aury.
# Sitio estático: no hay paso de build, solo se publica la carpeta raíz del repo.
[build]
  publish = "."
  command = ""

# Cabeceras de caché para que las imágenes carguen rápido en visitas repetidas.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
